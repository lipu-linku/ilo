headers: >
  # Generated from the JSON schema of sona Linku
callbacks:
  - - black
  - - isort
generate:
  - source: sona/api/generated/v2/word.json
    destination: src/sona/word.py
    root_name: Word
    python_version: "3.12"
  - source: sona/api/generated/v2/words.json
    destination: src/sona/words.py
    root_name: Words
    python_version: "3.12"

  - source: sona/api/generated/v2/glyph.json
    destination: src/sona/glyph.py
    root_name: Glyph
    python_version: "3.12"
  - source: sona/api/generated/v2/glyphs.json
    destination: src/sona/glyphs.py
    root_name: Glyphs
    python_version: "3.12"

  - source: sona/api/generated/v2/sign.json
    destination: src/sona/sign.py
    root_name: Sign
    python_version: "3.12"
  - source: sona/api/generated/v2/signs.json
    destination: src/sona/signs.py
    root_name: Signs
    python_version: "3.12"

  - source: sona/api/generated/v2/fingerspelling.json
    destination: src/sona/fingerspelling.py
    root_name: Fingerspelling
    python_version: "3.12"
  - source: sona/api/generated/v2/fingerspellings.json
    destination: src/sona/fingerspellings.py
    root_name: Fingerspellings
    python_version: "3.12"

  - source: sona/api/generated/v2/font.json
    destination: src/sona/font.py
    root_name: Font
    python_version: "3.12"
  - source: sona/api/generated/v2/fonts.json
    destination: src/sona/fonts.py
    root_name: Fonts
    python_version: "3.12"

  - source: sona/api/generated/v2/language.json
    destination: src/sona/language.py
    root_name: Language
    python_version: "3.12"
  - source: sona/api/generated/v2/languages.json
    destination: src/sona/languages.py
    root_name: Languages
    python_version: "3.12"
